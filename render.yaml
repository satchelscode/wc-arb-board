services:
  - type: web
    name: wc-arb-board-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 web:app
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wc-arb-db
          property: connectionString
      - key: ODDS_API_KEY
        sync: false
      - key: SCAN_INTERVAL_SECONDS
        value: "300"
      - key: FALCON_ENABLED
        value: "true"
      - key: FALCON_USERNAME
        sync: false
      - key: FALCON_PASSWORD
        sync: false
      - key: METALLIC_ENABLED
        value: "false"
      - key: METALLIC_LOGIN_URL
        sync: false
      - key: METALLIC_STRAIGHT_URL
        sync: false
      - key: METALLIC_WC_HELPER_URL
        sync: false
      - key: METALLIC_USERNAME
        sync: false
      - key: METALLIC_PASSWORD
        sync: false

  - type: worker
    name: wc-arb-board-worker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -u worker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wc-arb-db
          property: connectionString
      - key: ODDS_API_KEY
        sync: false
      - key: SCAN_INTERVAL_SECONDS
        value: "300"
      - key: FALCON_ENABLED
        value: "true"
      - key: FALCON_USERNAME
        sync: false
      - key: FALCON_PASSWORD
        sync: false
      - key: METALLIC_ENABLED
        value: "false"
      - key: METALLIC_LOGIN_URL
        sync: false
      - key: METALLIC_STRAIGHT_URL
        sync: false
      - key: METALLIC_WC_HELPER_URL
        sync: false
      - key: METALLIC_USERNAME
        sync: false
      - key: METALLIC_PASSWORD
        sync: false
      - key: ODDS_API_BOOKS
        value: "pinnacle,draftkings,fanduel"
      - key: ODDS_API_MARKETS
        value: "team_totals,totals"

databases:
  - name: wc-arb-db
    databaseName: wc_arb_board
    plan: basic-256mb
