services:
  - type: web
    name: wc-arb-board-web
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python -c "import psycopg; from app.db import _normalize_database_url; assert _normalize_database_url('postgresql://u:p@h/d').startswith('postgresql+psycopg://')"
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 web:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: wc-arb-db
          property: connectionString
      - key: ODDS_API_KEY
        sync: false
      - key: SCAN_INTERVAL_SECONDS
        value: "300"
      - key: FALCON_ENABLED
        value: "true"
      - key: FALCON_USERNAME
        sync: false
      - key: FALCON_PASSWORD
        sync: false
      - key: METALLIC_ENABLED
        sync: false
      - key: METALLIC_USERNAME
        sync: false
      - key: METALLIC_PASSWORD
        sync: false
      - key: METALLIC_SCHEDULE_POST_BODY
        sync: false
      - key: BUCKEYE2_ENABLED
        sync: false
      - key: BUCKEYE2_USERNAME
        sync: false
      - key: BUCKEYE2_PASSWORD
        sync: false
      - key: BUCKEYE2_AUTH_USERID
        sync: false
      - key: BUCKEYE2_LINES_POST_BODY
        sync: false
      - key: BUCKEYE2_LOGIN_URL
        sync: false
      - key: ODDS_API_PROP_MARKETS
        value: "player_goal_scorer_anytime,player_first_goal_scorer,alternate_spreads,alternate_totals"
      - key: KALSHI_ENABLED
        sync: false

  - type: worker
    name: wc-arb-board-worker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python -c "import psycopg; from app.db import _normalize_database_url; assert _normalize_database_url('postgresql://u:p@h/d').startswith('postgresql+psycopg://')"
    startCommand: python -u worker.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        fromDatabase:
          name: wc-arb-db
          property: connectionString
      - key: ODDS_API_KEY
        sync: false
      - key: SCAN_INTERVAL_SECONDS
        value: "300"
      - key: FALCON_ENABLED
        value: "true"
      - key: FALCON_USERNAME
        sync: false
      - key: FALCON_PASSWORD
        sync: false
      - key: METALLIC_ENABLED
        sync: false
      - key: METALLIC_USERNAME
        sync: false
      - key: METALLIC_PASSWORD
        sync: false
      - key: METALLIC_SCHEDULE_POST_BODY
        sync: false
      - key: BUCKEYE2_ENABLED
        sync: false
      - key: BUCKEYE2_USERNAME
        sync: false
      - key: BUCKEYE2_PASSWORD
        sync: false
      - key: BUCKEYE2_AUTH_USERID
        sync: false
      - key: BUCKEYE2_LINES_POST_BODY
        sync: false
      - key: BUCKEYE2_LOGIN_URL
        sync: false
      - key: ODDS_API_BOOKS
        value: "pinnacle,draftkings,fanduel,betonlineag,bookmaker"
      - key: ODDS_API_MARKETS
        value: "h2h,spreads,totals,team_totals"
      - key: ODDS_API_PROP_MARKETS
        value: "player_goal_scorer_anytime,player_first_goal_scorer,alternate_spreads,alternate_totals"
      - key: KALSHI_ENABLED
        sync: false
      - key: KALSHI_SERIES_TICKERS
        value: "KXWCGAME,KXWCTOTAL,KXWCTEAMTOTAL,KXWCSPREAD,KXWCGOAL"
      - key: ARB_EXCLUDE_BOOKS
        value: "kalshi"

databases:
  - name: wc-arb-db
    databaseName: wc_arb_board
    plan: basic-256mb
